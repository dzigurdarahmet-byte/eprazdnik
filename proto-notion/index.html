<head>
<meta charset="utf-8" />
<title>Е-Праздник — Каталог</title>
<meta name="viewport" content="width=1280, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --bg-hover: #f1f1ef;
    --bg-soft: #f7f7f5;
    --border: #e9e9e7;
    --border-strong: #dfdfdc;
    --text: #37352f;
    --text-muted: #787774;
    --text-light: #9b9a97;
    --link: #2383e2;
    --link-hover: #1a6bb8;

    /* pastel tag colors */
    --tag-gray-bg: #ebeced;     --tag-gray-fg: #5a5a57;
    --tag-brown-bg: #eee0da;    --tag-brown-fg: #64473a;
    --tag-orange-bg: #faebdd;   --tag-orange-fg: #77481a;
    --tag-yellow-bg: #fbf3db;   --tag-yellow-fg: #715b03;
    --tag-green-bg: #ddedea;    --tag-green-fg: #1a6055;
    --tag-blue-bg: #ddebf1;     --tag-blue-fg: #1d617a;
    --tag-purple-bg: #eae4f2;   --tag-purple-fg: #4f3e7a;
    --tag-pink-bg: #f4dfeb;     --tag-pink-fg: #803764;
    --tag-red-bg: #fbe4e4;      --tag-red-fg: #8a3232;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-soft); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
  }
  #root { height: 100vh; }
  button { font-family: inherit; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(55,53,47,.16); border-radius: 5px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(55,53,47,.28); background-clip: content-box; border: 2px solid transparent; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
